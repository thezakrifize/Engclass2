<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fern English Quiz — Lessons 1–Current</title>
  <style>
    :root{
      --ink:#111111;
      --paper:#f5f2ea;
      --red:#e5332a;
      --muted:#6f6b63;
      --line:#cfc9bd;
      --good:#167c4f;
      --bad:#b42318;
      --panel:#fffdf8;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--paper);
      color:var(--ink);
      font-family:Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height:100vh;
    }
    .shell{max-width:1120px;margin:0 auto;padding:24px}
    header{
      display:grid;
      grid-template-columns:1fr auto;
      gap:24px;
      align-items:end;
      border-top:12px solid var(--ink);
      padding-top:18px;
      margin-bottom:24px;
    }
    h1{font-size:clamp(30px,5vw,62px);line-height:.92;margin:0;letter-spacing:-.05em;max-width:760px}
    .kicker{font-size:13px;text-transform:uppercase;letter-spacing:.16em;color:var(--red);font-weight:800;margin-bottom:8px}
    .meta{text-align:right;font-size:14px;line-height:1.5;color:var(--muted)}
    .grid{display:grid;grid-template-columns:260px 1fr;gap:24px}
    .sidebar,.card{background:var(--panel);border:2px solid var(--ink)}
    .sidebar{padding:18px;position:sticky;top:16px;height:max-content}
    .stat{border-bottom:1px solid var(--line);padding:14px 0}
    .stat:last-child{border-bottom:0}
    .label{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:800}
    .value{font-size:30px;font-weight:900;letter-spacing:-.04em;margin-top:4px}
    .timer-wrap{margin-top:8px}
    .timer-track{height:10px;background:#ded8cc;overflow:hidden}
    .timer-bar{height:100%;background:var(--red);width:100%;transition:width 1s linear}
    .card{padding:clamp(20px,4vw,48px);min-height:600px;display:flex;flex-direction:column}
    .question-no{font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--red);font-weight:900}
    .question{font-size:clamp(28px,4vw,48px);line-height:1.08;letter-spacing:-.035em;margin:18px 0 28px;max-width:850px}
    .hint{font-size:15px;color:var(--muted);margin-top:-14px;margin-bottom:24px}
    .answers{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    button.answer{
      text-align:left;
      border:2px solid var(--ink);
      background:transparent;
      padding:18px;
      min-height:74px;
      font:inherit;
      font-size:18px;
      font-weight:750;
      cursor:pointer;
      transition:.15s ease;
    }
    button.answer:hover:not(:disabled){background:var(--ink);color:white;transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--red)}
    button.answer:disabled{cursor:default}
    button.answer.correct{background:#dff4e9;border-color:var(--good);color:#0d5b39}
    button.answer.wrong{background:#fde7e4;border-color:var(--bad);color:#7a1a12}
    .explanation{display:none;margin-top:26px;border-top:3px solid var(--ink);padding-top:20px}
    .explanation.show{display:block}
    .result-tag{display:inline-block;padding:6px 10px;font-size:12px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
    .result-tag.good{background:var(--good);color:white}
    .result-tag.bad{background:var(--bad);color:white}
    .explanation h3{margin:0 0 8px;font-size:24px}
    .explanation p{font-size:17px;line-height:1.7;margin:8px 0;color:#2b2925}
    .controls{margin-top:auto;padding-top:28px;display:flex;justify-content:space-between;align-items:center;gap:16px}
    .next,.restart{
      border:0;background:var(--red);color:white;padding:15px 22px;font-weight:900;font-size:16px;cursor:pointer;
    }
    .next:disabled{background:#aaa59d;cursor:not-allowed}
    .small{font-size:13px;color:var(--muted)}
    .intro,.final{padding:18px 0}
    .intro ul{line-height:1.8;color:#333}
    .start{border:0;background:var(--ink);color:white;padding:18px 24px;font-size:18px;font-weight:900;cursor:pointer;margin-top:18px}
    .final-score{font-size:clamp(64px,12vw,140px);line-height:.9;font-weight:950;letter-spacing:-.08em;color:var(--red);margin:24px 0}
    .breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:24px 0}
    .box{border:2px solid var(--ink);padding:16px;background:#fff}
    @media(max-width:800px){
      .grid{grid-template-columns:1fr}
      .sidebar{position:static;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
      .stat{border-bottom:0;border-right:1px solid var(--line);padding:8px}
      .stat:last-child{border-right:0}
      .value{font-size:22px}
      .answers{grid-template-columns:1fr}
      header{grid-template-columns:1fr}.meta{text-align:left}
    }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div>
      <div class="kicker">Stage 1 · Lessons 1–Current</div>
      <h1>Foundation Check<br>40-Question Quiz</h1>
    </div>
    <div class="meta">Fern<br>60 seconds / question<br>คำอธิบายภาษาไทยหลังตอบ</div>
  </header>

  <div class="grid">
    <aside class="sidebar">
      <div class="stat"><div class="label">Question</div><div class="value" id="qStat">—</div></div>
      <div class="stat"><div class="label">Score</div><div class="value" id="scoreStat">0</div></div>
      <div class="stat"><div class="label">Time</div><div class="value"><span id="timeStat">60</span>s</div><div class="timer-wrap"><div class="timer-track"><div class="timer-bar" id="timerBar"></div></div></div></div>
      <div class="stat"><div class="label">Progress</div><div class="value" id="progressStat">0%</div></div>
    </aside>

    <main class="card" id="mainCard"></main>
  </div>
</div>

<script>

];

let index = -1, score = 0, answered = false, timeLeft = 60, timer = null;
const card = document.getElementById('mainCard');
const qStat = document.getElementById('qStat');
const scoreStat = document.getElementById('scoreStat');
const timeStat = document.getElementById('timeStat');
const progressStat = document.getElementById('progressStat');
const timerBar = document.getElementById('timerBar');

function intro(){
  card.innerHTML = `<div class="intro">
    <div class="question-no">Fern English Assessment</div>
    <div class="question">แบบทดสอบ Lesson 1 ถึงปัจจุบัน</div>
    <ul>
      <li>ทั้งหมด 40 ข้อ ข้อละ 4 ตัวเลือก</li>
      <li>มีเวลา 60 วินาทีต่อข้อ</li>
      <li>เมื่อเลือกคำตอบ ระบบจะแสดงเฉลยและคำอธิบายภาษาไทย</li>
      <li>เมื่อหมดเวลา ระบบจะถือว่าข้อนั้นตอบผิดและแสดงคำอธิบาย</li>
    </ul>
    <button class="start" onclick="startQuiz()">เริ่มทำข้อสอบ</button>
  </div>`;
}

function startQuiz(){index=0;score=0;renderQuestion();}

function renderQuestion(){
  clearInterval(timer); answered=false; timeLeft=60;
  const item=questions[index];
  qStat.textContent=`${index+1}/40`;
  scoreStat.textContent=score;
  progressStat.textContent=`${Math.round((index/40)*100)}%`;
  timeStat.textContent=timeLeft;
  timerBar.style.width='100%';
  card.innerHTML=`
    <div class="question-no">Question ${index+1} of 40</div>
    <div class="question">${item.q}</div>
    <div class="hint">เลือกคำตอบที่ถูกต้องที่สุด</div>
    <div class="answers">
      ${item.a.map((x,i)=>`<button class="answer" onclick="selectAnswer(${i})"><strong>${String.fromCharCode(65+i)}.</strong> ${x}</button>`).join('')}
    </div>
    <div class="explanation" id="exp"></div>
    <div class="controls">
      <div class="small">ตอบแล้วจึงไปข้อต่อไปได้</div>
      <button class="next" id="nextBtn" onclick="nextQuestion()" disabled>${index===39?'ดูผลคะแนน':'ข้อต่อไป →'}</button>
    </div>`;
  timer=setInterval(()=>{
    timeLeft--;
    timeStat.textContent=timeLeft;
    timerBar.style.width=`${(timeLeft/60)*100}%`;
    if(timeLeft<=0){clearInterval(timer); timeoutAnswer();}
  },1000);
}

function selectAnswer(choice){
  if(answered) return;
  answered=true; clearInterval(timer);
  const item=questions[index];
  const buttons=[...document.querySelectorAll('.answer')];
  buttons.forEach(b=>b.disabled=true);
  buttons[item.c].classList.add('correct');
  const isCorrect=choice===item.c;
  if(!isCorrect) buttons[choice].classList.add('wrong');
  if(isCorrect){score++;scoreStat.textContent=score;}
  showExplanation(isCorrect,item);
}

function timeoutAnswer(){
  if(answered) return;
  answered=true;
  const item=questions[index];
  const buttons=[...document.querySelectorAll('.answer')];
  buttons.forEach(b=>b.disabled=true);
  buttons[item.c].classList.add('correct');
  const exp=document.getElementById('exp');
  exp.classList.add('show');
  exp.innerHTML=`<span class="result-tag bad">หมดเวลา</span><h3>คำตอบที่ถูก: ${item.a[item.c]}</h3><p>${item.e}</p>`;
  document.getElementById('nextBtn').disabled=false;
}

function showExplanation(correct,item){
  const exp=document.getElementById('exp');
  exp.classList.add('show');
  exp.innerHTML=`<span class="result-tag ${correct?'good':'bad'}">${correct?'ตอบถูก':'ตอบผิด'}</span><h3>คำตอบที่ถูก: ${item.a[item.c]}</h3><p>${item.e}</p>`;
  document.getElementById('nextBtn').disabled=false;
}

function nextQuestion(){
  if(index<39){index++;renderQuestion();}else{showFinal();}
}

function showFinal(){
  clearInterval(timer);
  const pct=Math.round((score/40)*100);
  let level = pct>=90?'ยอดเยี่ยม — พื้นฐานแข็งแรง':pct>=80?'ผ่านดี — พร้อมเรียนบทถัดไป':pct>=70?'ผ่าน — ควรทบทวนบางหัวข้อ':'ควรทบทวน Lesson 1 ถึงปัจจุบันอีกครั้ง';
  qStat.textContent='40/40'; progressStat.textContent='100%'; timeStat.textContent='—'; timerBar.style.width='0%';
  card.innerHTML=`<div class="final">
    <div class="question-no">Final Result</div>
    <div class="question">ผลคะแนนของ Fern</div>
    <div class="final-score">${score}/40</div>
    <div class="breakdown">
      <div class="box"><div class="label">Accuracy</div><div class="value">${pct}%</div></div>
      <div class="box"><div class="label">Correct</div><div class="value">${score}</div></div>
      <div class="box"><div class="label">Review</div><div class="value">${40-score}</div></div>
    </div>
    <h3>${level}</h3>
    <p>เกณฑ์แนะนำ: หากได้ต่ำกว่า 80% ให้ทบทวน am/is/are, เอกพจน์–พหูพจน์, this/that/these/those, What is/are และ Do/Does ก่อนเรียนต่อ</p>
    <button class="restart" onclick="startQuiz()">ทำข้อสอบใหม่</button>
  </div>`;
}
intro();
</script>
</body>
</html>
